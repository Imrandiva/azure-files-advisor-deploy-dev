name: build-advisor-image

# Builds the Provisioning Advisor container image and publishes it to the
# GitHub Container Registry (GHCR) so it can be deployed to Azure Container
# Apps via the "Deploy to Azure" button (which needs a pullable image).
#
# The published package must be PUBLIC for an anonymous one-click deploy.
# GHCR package visibility is independent of repo visibility: after the first
# push, open the package settings and set visibility to Public (one time).

on:
  push:
    branches: [ main ]
    paths:
      - 'advisor/**'
      - '.github/workflows/build-advisor-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/azure-files-provisioning-advisor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./advisor
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
